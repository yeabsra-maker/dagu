{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Create Dagu Account</h2>
        <div id="errorMessage" class="error-message" style="display: none;"></div>
        <div id="successMessage" class="success-message" style="display: none;"></div>
        <form id="registerForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required minlength="3">
                <small>Letters, numbers, underscores only</small>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required minlength="8">
                <small>Min 8 chars, 1 uppercase, 1 number, 1 special character (!@#$%^&*)</small>
            </div>
            <button type="button" id="registerBtn" class="btn-primary">Register</button>
        </form>
        <p class="auth-link">Already have an account? <a href="/login">Login here</a></p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('registerBtn').onclick = async function() {
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const csrfToken = document.querySelector('input[name="csrf_token"]').value;
    const errorDiv = document.getElementById('errorMessage');
    const successDiv = document.getElementById('successMessage');
    errorDiv.style.display = 'none';
    successDiv.style.display = 'none';
    try {
        const response = await fetch('/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
            body: JSON.stringify({ username, password })
        });
        const data = await response.json();
        if (response.ok) {
            successDiv.style.display = 'block';
            successDiv.textContent = '✅ Registration successful! Redirecting to login...';
            setTimeout(() => window.location.href = '/login', 2000);
        } else {
            errorDiv.style.display = 'block';
            errorDiv.textContent = data.error || 'Registration failed';
        }
    } catch (error) {
        errorDiv.style.display = 'block';
        errorDiv.textContent = 'Connection error. Please try again.';
    }
};
</script>
{% endblock %}
