<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dagu Secure Chat - {% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="{% if request.endpoint == 'home' %}landing-page{% endif %}">
<nav class="navbar">
    <div class="nav-container">
        <a href="/" class="nav-brand"><i class="fas fa-comment-dots"></i> Dagu</a>
        <div class="nav-menu" id="navMenu">
            {% if session.get('user_id') %}
                <span>Welcome, {{ session.get('username') }}</span>
                <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
                {% if session.get('role') == 'admin' %}
                    <a href="/admin"><i class="fas fa-cog"></i> Admin</a>
                {% endif %}
                <a href="/chat"><i class="fas fa-comment"></i> Chat</a>
                <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
            {% else %}
                <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
                <a href="/login"><i class="fas fa-sign-in-alt"></i> Login</a>
                <a href="/register"><i class="fas fa-user-plus"></i> Register</a>
            {% endif %}
        </div>
    </div>
</nav>
<main class="container">
    {% block content %}{% endblock %}
</main>

<script src="{{ url_for('static', filename='script.js') }}"></script>
<script>
    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('darkMode', isDark);
        const toggleBtn = document.querySelector('.theme-toggle');
        if (toggleBtn) toggleBtn.textContent = isDark ? '☀️' : '🌙';
    }
    if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark-mode');
        const toggleBtn = document.querySelector('.theme-toggle');
        if (toggleBtn) toggleBtn.textContent = '☀️';
    }
    async function logout() {
        await fetch('/logout', { method: 'POST' });
        window.location.href = '/login';
    }
</script>
{% block scripts %}{% endblock %}
</body>
</html>
